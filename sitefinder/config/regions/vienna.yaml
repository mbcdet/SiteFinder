# Internal category -> OSM tag selectors (key=value). Add categories here, not in code.
categories:
  dentist:
    osm_tags: ["amenity=dentist", "healthcare=dentist"]
  hair_salon:
    osm_tags: ["shop=hairdresser"]
  # NOTE: OSM tags barbers as shop=hairdresser too, so this overlaps hair_salon by design;
  # the tag does not reliably distinguish them.
  barber:
    osm_tags: ["shop=hairdresser"]
  restaurant:
    osm_tags: ["amenity=restaurant"]
  cafe:
    osm_tags: ["amenity=cafe", "shop=coffee"]
  bakery:
    osm_tags: ["shop=bakery"]
  physiotherapist:
    osm_tags: ["healthcare=physiotherapist", "amenity=physiotherapist"]
